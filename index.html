<!DOCTYPE html>
<html>
<head>
    <style>
        body, html { margin: 0; padding: 0; height: 100vh; width: 100vw; overflow: hidden; background-color: #222; }
        canvas { width: 100%; height: 100%; display: block; }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <!-- We are using the layout-lite version for better compatibility -->
    <script src="https://unpkg.com"></script>
    <script>
        const r = new rive.Rive({
            src: './som-project01.riv', // The './' helps GitHub find the file in the same folder
            canvas: document.getElementById('canvas'),
            autoplay: true,
            stateMachines: 'State Machine 1',
            layout: new rive.Layout({
                fit: rive.Fit.Contain,
                alignment: rive.Alignment.Center
            }),
            onLoad: () => {
                r.resizeToCanvas();
            }
        });
    </script>
</body>
</html>
