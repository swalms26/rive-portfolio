<!DOCTYPE html>
<html>
<head>
  <style>
    body, html { margin: 0; padding: 0; height: 100vh; width: 100vw; background: #222; }
    canvas { width: 100%; height: 100%; display: block; }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <script src="https://unpkg.com"></script>
  <script>
    const r = new rive.Rive({
      src: 'som-project01.riv', // Double-check this matches your file exactly!
      canvas: document.getElementById('canvas'),
      autoplay: true,
      onLoad: () => { r.resizeToCanvas(); },
      onLoadError: () => { console.error('Rive failed to load'); }
    });
  </script>
</body>
</html>
